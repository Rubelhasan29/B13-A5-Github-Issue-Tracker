<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind and Daisy Ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

    <title>GITHUB | ISSUE | TRACKER | HOME PAGE</title>
</head>

<body>
    <header>
        <nav>
            <div class="navbar bg-base-100 shadow-sm p-6">
                <div class="flex-1">
                    <div class="flex gap-2 items-center">
                        <img class="h-13" src="./assets/github-logo.png" alt="github-logo">
                        <h3 class="font-bold text-2xl">GitHub Issues Tracker</h3>
                    </div>
                </div>
                <div class="flex gap-6 pr-3">
                    <input type="text" placeholder="🔍 Search issue...."
                        class="p-6 input input-bordered w-24 md:w-auto" />
                    <div class=" ">
                        <button class="btn btn-primary p-6"><i class="fa-brands fa-sistrix"></i> Search</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="w-10/12 mx-auto">

        <!-- ALl, Open.... Button Section -->
        <section class="sectionContainer  bg-white shadow-sm mt-12 border-2 border-gray-200 rounded-lg">
            <div id="buttons" class="flex gap-5 p-7 ">
                <button id="allBtn" class="btn btn-primary border border-black px-10">All</button>
                <button id="openBtn" class="btn border border-black px-10">Open</button>
                <button id="closedBtn" class="btn border border-black px-10">Closed</button>
            </div>
        </section>

        <!-- Total Issue bar -->
        <section class="sectionContainer  bg-white shadow-sm mt-6 border-2 border-gray-200 rounded-lg">
            <div class="flex justify-between items-center">

                <!-- total issue right -->
                <div class="flex items-center gap-3 p-6">
                    <div class="bg-purple-200 rounded-full p-3"><img src="./assets/Aperture.png" alt="Aperture"></div>
                    <div class="">
                        <h5 class="font-semibold text-2xl"><span id="totalIssue">0</span> Issues</h5>
                        <p class="opacity-60">Track and manage your project issues</p>
                    </div>
                </div>

                <!-- total issue left -->
                <div class="flex gap-6">
                    <div class="flex gap-5 items-center">
                        <div class="h-4 w-4 bg-green-500 rounded-full"></div>
                        <div class="font-semibold text-xl">Open</div>
                    </div>
                    <div class="flex gap-5 pr-5 items-center">
                        <div class="h-4 w-4 bg-purple-500 rounded-full"></div>
                        <div class="font-semibold text-xl">Closed</div>
                    </div>
                </div>
            </div>
        </section>


        <div id="loadingSpinner" class="flex justify-center mt-20 hidden">
            <span class="loading loading-bars loading-xl flex"></span>
        </div>
        <!-- Card Section -->
        <section id="CardContainer" class="  shadow-md grid grid-cols-4 gap-4 p-5 space-y-4">

        </section>

    </main>

    <script src="./script/home.js"></script>
</body>

</html>
